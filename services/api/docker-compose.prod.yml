services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/legal:/etc/nginx/legal:ro
    depends_on:
      - api
    restart: always
    networks:
      - melon_prod

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    expose:
      - "3000"          # internal only — never exposed directly to the internet
    restart: always
    networks:
      - melon_prod
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

# When you get a domain, add a certbot service here for auto-renewal.
# See: https://certbot.eff.org/instructions

networks:
  melon_prod:
    driver: bridge
