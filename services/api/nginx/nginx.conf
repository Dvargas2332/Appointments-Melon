worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           DENY               always;
    add_header X-Content-Type-Options    nosniff            always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "no-referrer"      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Rate limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Upstream ─────────────────────────────────────────────────────────────
    upstream melon_api {
        server api:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Keep for future Let's Encrypt migration (certbot ACME challenge)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ────────────────────────────────────────────────────────────────
    # Cert paths work for both cases:
    #   • Self-signed  → generated by scripts/gen-certs.sh into nginx/certs/self/
    #   • Let's Encrypt → symlink nginx/certs/self/ to the certbot live/ folder
    server {
        listen 443 ssl http2;
        server_name _;   # accepts IP and any hostname

        ssl_certificate     /etc/nginx/certs/self/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/self/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Auth endpoints — stricter rate limit
        location ~ ^/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass         http://melon_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # All other API routes
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://melon_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }
}
